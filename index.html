<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ahmadsyar's Tech Guide</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma/css/bulma.min.css">
</head>
<body>

<div id="navbar"></div>

<!-- Section with Columns -->
<section class="section">
  <div class="container">
    <h2 class="title">Columns</h2>
    <div class="columns">
      <div class="column is-one-third">Column 1</div>
      <div class="column is-one-third">Column 2</div>
      <div class="column is-one-third">Column 3</div>
    </div>
  </div>
</section>

<!-- Buttons -->
<section class="section">
  <div class="container">
    <h2 class="title">Buttons</h2>
    <button class="button is-primary">Primary</button>
    <button class="button is-link">Link</button>
    <button class="button is-info">Info</button>
    <button class="button is-success">Success</button>
    <button class="button is-warning">Warning</button>
    <button class="button is-danger">Danger</button>
  </div>
</section>

<!-- Notification -->
<section class="section">
  <div class="container">
    <h2 class="title">Notifications</h2>
    <div class="notification is-primary">Primary Notification</div>
    <div class="notification is-link">Link Notification</div>
    <div class="notification is-info">Info Notification</div>
    <div class="notification is-success">Success Notification</div>
    <div class="notification is-warning">Warning Notification</div>
    <div class="notification is-danger">Danger Notification</div>
  </div>
</section>
<!-- Footer -->
<footer class="footer">
  <div class="content has-text-centered">
    <p>Ahmadsyar &copy; 2026</p>
  </div>
</footer>
</body>
<script>
fetch('navbar.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  });
</script>
</html>
